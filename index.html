  body { text-align: center; padding: 120px; background-color:#181818;}
  h1 { font-size: 100px; font-weight:900;line-height:80px; }
  body { font: 20px Helvetica, sans-serif; color: #afafaf; }
  article { display: block; text-align: left; width: 650px; margin: 0 auto; }
  a { color: red; text-decoration: none; }
  a:hover { color: #333; text-decoration: none; }
</style>

<script>
    const quotes = [
        { text: "Life is what happens when you're busy making other plans.", author: "John Lennon" },
        { text: "The greatest glory in living lies not in never falling, but in rising every time we fall.", author: "Nelson Mandela" },
        { text: "The way to get started is to quit talking and begin doing.", author: "Walt Disney" },
        { text: "Your time is limited, so don't waste it living someone else's life.", author: "Steve Jobs" },
        { text: "If life were predictable it would cease to be life, and be without flavor.", author: "Eleanor Roosevelt" }
    ];

    const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];

    document.querySelector('article').innerHTML = `
        <h1>${randomQuote.text}</h1>
        <div>
                <p>&mdash; ${randomQuote.author}</p>
        </div>
    `;
</script>
